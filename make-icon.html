<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>アイコン生成</title></head>
<body>
<h2>アイコン生成中...</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:8px;border-radius:43px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:8px;width:192px;height:192px;border-radius:43px"></canvas>
<br>
<button onclick="dl(192)">icon-192.png をダウンロード</button>
<button onclick="dl(512)">icon-512.png をダウンロード</button>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.225;

  // 角丸背景
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.arcTo(size, 0, size, r, r);
  ctx.lineTo(size, size - r);
  ctx.arcTo(size, size, size - r, size, r);
  ctx.lineTo(r, size);
  ctx.arcTo(0, size, 0, size - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.fillStyle = '#fff0fa';
  ctx.fill();

  // ピンクの枠
  ctx.strokeStyle = '#ff8fab';
  ctx.lineWidth = size * 0.024;
  ctx.stroke();

  // 🧹絵文字
  ctx.font = `${size * 0.58}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🧹', size / 2, size / 2 + size * 0.04);
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

function dl(size) {
  const canvas = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
